services:
  yfinance-mcp-server:
    build:
      context: .
    environment:
      YF_TRANSPORT: streamable-http
      YF_HTTP_HOST: 0.0.0.0
      YF_HTTP_PORT: 8000
      YF_LOG_LEVEL: INFO
      YF_UPSTREAM_CONCURRENCY: 4
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
